version: '3.8'

services:
  taskflow-pro:
    build: .
    container_name: taskflow-pro
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - taskflow-network

networks:
  taskflow-network:
    driver: bridge